<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="w-full h-full">
  <defs>
    <linearGradient id="wildlifeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#344F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4991A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F9F5F0"/>

  <!-- Farm field -->
  <g transform="translate(50,150)">
    <!-- Ground -->
    <rect x="0" y="50" width="300" height="50" fill="#344F1F" opacity="0.3"/>
    <!-- Crops -->
    <rect x="20" y="30" width="5" height="70" fill="#F4991A"/>
    <rect x="40" y="35" width="5" height="65" fill="#F4991A"/>
    <rect x="60" y="25" width="5" height="75" fill="#F4991A"/>
    <rect x="80" y="40" width="5" height="60" fill="#F4991A"/>
    <rect x="100" y="30" width="5" height="70" fill="#F4991A"/>
    <rect x="120" y="35" width="5" height="65" fill="#F4991A"/>
    <rect x="140" y="25" width="5" height="75" fill="#F4991A"/>
    <rect x="160" y="40" width="5" height="60" fill="#F4991A"/>
    <rect x="180" y="30" width="5" height="70" fill="#F4991A"/>
    <rect x="200" y="35" width="5" height="65" fill="#F4991A"/>
    <rect x="220" y="25" width="5" height="75" fill="#F4991A"/>
    <rect x="240" y="40" width="5" height="60" fill="#F4991A"/>
    <rect x="260" y="30" width="5" height="70" fill="#F4991A"/>
    <rect x="280" y="35" width="5" height="65" fill="#F4991A"/>
  </g>

  <!-- Wildlife (deer) -->
  <g transform="translate(150,120)">
    <ellipse cx="20" cy="25" rx="15" ry="10" fill="#344F1F"/>
    <circle cx="15" cy="20" r="3" fill="#F4991A"/>
    <circle cx="25" cy="20" r="3" fill="#F4991A"/>
    <!-- Legs -->
    <rect x="12" y="30" width="3" height="15" fill="#344F1F"/>
    <rect x="18" y="30" width="3" height="15" fill="#344F1F"/>
    <rect x="22" y="30" width="3" height="15" fill="#344F1F"/>
    <rect x="28" y="30" width="3" height="15" fill="#344F1F"/>
    <!-- Antlers -->
    <line x1="20" y1="15" x2="15" y2="10" stroke="#344F1F" stroke-width="2"/>
    <line x1="20" y1="15" x2="25" y2="10" stroke="#344F1F" stroke-width="2"/>
  </g>

  <!-- Camera/Sensor -->
  <g transform="translate(300,80)">
    <rect x="0" y="0" width="20" height="15" fill="#F4991A"/>
    <circle cx="10" cy="7.5" r="4" fill="#344F1F"/>
    <rect x="8" y="-5" width="4" height="5" fill="#344F1F"/>
  </g>

  <!-- Warning signal -->
  <g transform="translate(320,50)">
    <polygon points="0,10 5,0 10,10" fill="#F4991A"/>
    <text x="5" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#344F1F">!</text>
  </g>

  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#344F1F">獣害対策</text>
</svg>