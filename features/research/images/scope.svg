<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="w-full h-full">
  <defs>
    <linearGradient id="scopeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#344F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4991A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F9F5F0"/>

  <!-- 3D Grid representing spatial environment -->
  <g transform="translate(50,50)">
    <!-- Grid lines -->
    <path d="M0,0 L300,0 L300,200 L0,200 Z" fill="none" stroke="#344F1F" stroke-width="1" opacity="0.3"/>
    <path d="M0,0 L300,200 M300,0 L0,200" stroke="#344F1F" stroke-width="1" opacity="0.3"/>
    <path d="M150,0 L150,200 M0,100 L300,100" stroke="#344F1F" stroke-width="1" opacity="0.3"/>

    <!-- 3D cubes representing objects -->
    <g transform="translate(50,50)">
      <path d="M0,0 L20,0 L20,20 L0,20 Z" fill="#F4991A" opacity="0.8"/>
      <path d="M0,0 L10,-10 L30,-10 L20,0 Z" fill="#344F1F" opacity="0.6"/>
      <path d="M20,0 L30,-10 L30,10 L20,20 Z" fill="#344F1F" opacity="0.6"/>
    </g>

    <g transform="translate(200,120)">
      <path d="M0,0 L15,0 L15,15 L0,15 Z" fill="#F4991A" opacity="0.8"/>
      <path d="M0,0 L8,-8 L23,-8 L15,0 Z" fill="#344F1F" opacity="0.6"/>
      <path d="M15,0 L23,-8 L23,7 L15,15 Z" fill="#344F1F" opacity="0.6"/>
    </g>

    <!-- Robot representation -->
    <g transform="translate(120,80)">
      <circle cx="10" cy="10" r="8" fill="#344F1F"/>
      <circle cx="10" cy="10" r="3" fill="#F4991A"/>
      <!-- Vision cone -->
      <path d="M10,10 L25,5 L25,15 Z" fill="#F4991A" opacity="0.4"/>
    </g>
  </g>

  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#344F1F">SCOPE</text>
</svg>