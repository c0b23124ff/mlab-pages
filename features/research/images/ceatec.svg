<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="w-full h-full">
  <defs>
    <linearGradient id="ceatecGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#344F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4991A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F9F5F0"/>

  <!-- Exhibition booth -->
  <g transform="translate(50,100)">
    <!-- Booth structure -->
    <rect x="0" y="50" width="300" height="80" fill="#F4991A"/>
    <!-- Banner -->
    <rect x="0" y="20" width="300" height="30" fill="#344F1F"/>
    <text x="150" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#F9F5F0">CEATEC</text>

    <!-- Display screens -->
    <rect x="20" y="60" width="40" height="25" fill="#344F1F" opacity="0.8"/>
    <rect x="80" y="60" width="40" height="25" fill="#344F1F" opacity="0.8"/>
    <rect x="180" y="60" width="40" height="25" fill="#344F1F" opacity="0.8"/>
    <rect x="240" y="60" width="40" height="25" fill="#344F1F" opacity="0.8"/>
  </g>

  <!-- Visitors -->
  <g transform="translate(100,180)">
    <circle cx="0" cy="0" r="8" fill="#344F1F"/>
    <circle cx="30" cy="0" r="8" fill="#344F1F"/>
    <circle cx="60" cy="0" r="8" fill="#344F1F"/>
  </g>

  <!-- Robot on display -->
  <g transform="translate(200,160)">
    <rect x="0" y="10" width="25" height="30" fill="#F4991A"/>
    <circle cx="12.5" cy="45" r="6" fill="#344F1F"/>
  </g>

  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#344F1F">CEATEC</text>
</svg>