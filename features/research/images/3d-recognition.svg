<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="w-full h-full">
  <defs>
    <linearGradient id="recognitionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#344F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4991A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F9F5F0"/>

  <!-- 3D Point Cloud representation -->
  <g transform="translate(100,50)">
    <!-- Point cloud dots -->
    <circle cx="50" cy="50" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="60" cy="45" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="70" cy="55" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="55" cy="60" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="65" cy="50" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="45" cy="55" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="75" cy="60" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="40" cy="50" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="80" cy="45" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="50" cy="40" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="70" cy="40" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="60" cy="65" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="45" cy="45" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="75" cy="50" r="2" fill="#344F1F" opacity="0.8"/>
    <circle cx="55" cy="55" r="2" fill="#344F1F" opacity="0.8"/>

    <!-- 3D Object outline -->
    <path d="M50,50 L70,45 L75,60 L55,65 Z" fill="none" stroke="#F4991A" stroke-width="2" opacity="0.7"/>
    <path d="M50,50 L45,55 L40,50 L45,45 Z" fill="none" stroke="#F4991A" stroke-width="2" opacity="0.7"/>
    <path d="M70,45 L75,40 L80,45 L75,50 Z" fill="none" stroke="#F4991A" stroke-width="2" opacity="0.7"/>
    <path d="M75,60 L80,55 L75,70 L70,65 Z" fill="none" stroke="#F4991A" stroke-width="2" opacity="0.7"/>
    <path d="M55,65 L50,70 L55,75 L60,70 Z" fill="none" stroke="#F4991A" stroke-width="2" opacity="0.7"/>

    <!-- Recognition indicator -->
    <g transform="translate(120,80)">
      <circle cx="0" cy="0" r="15" fill="none" stroke="#344F1F" stroke-width="2"/>
      <path d="M-8,-8 L-3,-3 M-8,8 L-3,3 M8,-8 L3,-3 M8,8 L3,3" stroke="#F4991A" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#F4991A"/>
    </g>
  </g>

  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#344F1F">3D Recognition</text>
</svg>