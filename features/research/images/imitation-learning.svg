<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="w-full h-full">
  <defs>
    <linearGradient id="imitationGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#344F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4991A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F9F5F0"/>

  <!-- Human figure demonstrating -->
  <g transform="translate(50,100)">
    <!-- Head -->
    <circle cx="20" cy="20" r="15" fill="#344F1F"/>
    <!-- Body -->
    <rect x="10" y="35" width="20" height="40" fill="#344F1F"/>
    <!-- Arms -->
    <rect x="0" y="40" width="10" height="25" fill="#344F1F"/>
    <rect x="30" y="40" width="10" height="25" fill="#344F1F"/>
    <!-- Legs -->
    <rect x="12" y="75" width="6" height="25" fill="#344F1F"/>
    <rect x="22" y="75" width="6" height="25" fill="#344F1F"/>
  </g>

  <!-- Robot observing -->
  <g transform="translate(200,120)">
    <!-- Robot body -->
    <rect x="10" y="20" width="30" height="40" fill="#F4991A"/>
    <!-- Head -->
    <rect x="15" y="5" width="20" height="20" fill="#F4991A"/>
    <!-- Eyes -->
    <circle cx="20" cy="12" r="3" fill="#344F1F"/>
    <circle cx="30" cy="12" r="3" fill="#344F1F"/>
    <!-- Arms -->
    <rect x="0" y="25" width="10" height="20" fill="#F4991A"/>
    <rect x="40" y="25" width="10" height="20" fill="#F4991A"/>
    <!-- Wheels -->
    <circle cx="15" cy="65" r="8" fill="#344F1F"/>
    <circle cx="35" cy="65" r="8" fill="#344F1F"/>
  </g>

  <!-- Arrow showing learning -->
  <path d="M120,140 L180,140" stroke="#344F1F" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#344F1F"/>
    </marker>
  </defs>

  <!-- Learning brain icon -->
  <g transform="translate(300,50)">
    <path d="M0,20 Q10,0 20,20 Q30,0 40,20 Q50,40 40,60 Q30,80 20,60 Q10,80 0,60 Z" fill="#F4991A" opacity="0.7"/>
    <circle cx="20" cy="40" r="8" fill="#344F1F"/>
    <path d="M15,35 L20,45 L25,35" stroke="#F4991A" stroke-width="2" fill="none"/>
  </g>

  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#344F1F">模倣学習</text>
</svg>