<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="w-full h-full">
  <defs>
    <linearGradient id="activitiesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#344F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4991A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F9F5F0"/>

  <!-- Various activity icons -->
  <g transform="translate(50,50)">
    <!-- Factory robot -->
    <rect x="0" y="20" width="30" height="40" fill="#F4991A"/>
    <rect x="5" y="5" width="20" height="20" fill="#F4991A"/>
    <circle cx="10" cy="50" r="8" fill="#344F1F"/>
    <circle cx="25" cy="50" r="8" fill="#344F1F"/>
  </g>

  <g transform="translate(120,80)">
    <!-- Service robot -->
    <circle cx="15" cy="15" r="12" fill="#F4991A"/>
    <rect x="10" y="27" width="10" height="25" fill="#F4991A"/>
    <circle cx="15" cy="55" r="6" fill="#344F1F"/>
  </g>

  <g transform="translate(200,60)">
    <!-- Medical robot -->
    <rect x="0" y="10" width="25" height="35" fill="#F4991A"/>
    <rect x="5" y="0" width="15" height="15" fill="#F4991A"/>
    <path d="M5,25 L20,25 M12.5,18 L12.5,32" stroke="#344F1F" stroke-width="2"/>
  </g>

  <g transform="translate(280,90)">
    <!-- Exploration robot -->
    <rect x="0" y="15" width="30" height="25" fill="#F4991A"/>
    <circle cx="8" cy="45" r="8" fill="#344F1F"/>
    <circle cx="22" cy="45" r="8" fill="#344F1F"/>
    <!-- Antenna -->
    <line x1="15" y1="15" x2="15" y2="5" stroke="#344F1F" stroke-width="2"/>
  </g>

  <!-- Connecting lines -->
  <path d="M35,40 L95,95 M155,95 L215,75 M245,85 L265,105" stroke="#344F1F" stroke-width="2" opacity="0.5"/>

  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#344F1F">その他活動</text>
</svg>