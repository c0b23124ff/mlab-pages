<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="w-full h-full">
  <defs>
    <linearGradient id="dojoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#344F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4991A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F9F5F0"/>

  <!-- Dojo building -->
  <g transform="translate(100,80)">
    <!-- Building -->
    <rect x="0" y="50" width="200" height="80" fill="#F4991A"/>
    <!-- Roof -->
    <polygon points="0,50 100,20 200,50" fill="#344F1F"/>
    <!-- Door -->
    <rect x="85" y="90" width="30" height="40" fill="#344F1F"/>
    <!-- Windows -->
    <rect x="20" y="70" width="25" height="20" fill="#344F1F" opacity="0.7"/>
    <rect x="155" y="70" width="25" height="20" fill="#344F1F" opacity="0.7"/>
  </g>

  <!-- Training elements -->
  <g transform="translate(50,200)">
    <!-- Robot -->
    <rect x="0" y="10" width="20" height="30" fill="#F4991A"/>
    <circle cx="5" cy="45" r="5" fill="#344F1F"/>
    <circle cx="15" cy="45" r="5" fill="#344F1F"/>
  </g>

  <g transform="translate(320,210)">
    <!-- Tools -->
    <rect x="0" y="0" width="30" height="5" fill="#344F1F"/>
    <circle cx="35" cy="2.5" r="3" fill="#F4991A"/>
  </g>

  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#344F1F">道場</text>
</svg>